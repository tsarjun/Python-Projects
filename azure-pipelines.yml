trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.9'

steps:

# 1️⃣ Use Python version
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(pythonVersion)'
    addToPath: true

# 2️⃣ Install dependencies
- script: |
    python -m pip install --upgrade pip
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    pip install pytest pytest-cov
  displayName: 'Install dependencies'

# 3️⃣ Run tests with coverage
- script: |
    pytest --cov=. --cov-report=xml
  displayName: 'Run Tests'

# 4️⃣ Prepare SonarQube Analysis
- task: SonarQubePrepare@5
  inputs:
    SonarQube: 'sonarqube-connection'   # Service connection name
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: 'python-project'
    cliProjectName: 'python-project'
    cliSources: '.'
    extraProperties: |
      sonar.python.coverage.reportPaths=coverage.xml

# 5️⃣ Run SonarQube Scan
- task: SonarQubeAnalyze@5

# 6️⃣ Publish SonarQube Result (Quality Gate)
- task: SonarQubePublish@5
  inputs:
    pollingTimeoutSec: '300'