trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.9'

steps:

# 1️⃣ Use Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(pythonVersion)'
    addToPath: true

# 2️⃣ Install dependencies
- script: |
    python -m pip install --upgrade pip
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    pip install pytest pytest-cov
  displayName: 'Install dependencies'

# ✅ 3️⃣ FIX HERE (Replace your test step)
- script: |
    pytest . --cov=. --cov-report=xml || true
  displayName: 'Run Tests'

# 🔍 (Optional but recommended - DEBUG)
- script: |
    ls -l
    cat coverage.xml || echo "coverage.xml not found"
  displayName: 'Check Coverage File'

# 4️⃣ SonarQube Scan (CLI)
- script: |
    wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1-linux.zip
    unzip sonar-scanner-cli-*.zip
    export PATH=$PATH:$(pwd)/sonar-scanner-*/bin

    sonar-scanner \
      -Dsonar.projectKey=python-project \
      -Dsonar.sources=. \
      -Dsonar.host.url=http://<your-sonar-ip>:9000 \
      -Dsonar.login=$(SONAR_TOKEN) \
      -Dsonar.python.coverage.reportPaths=coverage.xml
  displayName: 'Run Sonar Scanner'